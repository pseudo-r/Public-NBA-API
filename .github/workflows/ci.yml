name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    defaults:
      run:
        working-directory: nba_service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nba_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nba_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      CELERY_BROKER_URL: ""
      NBA_STATS_BASE_URL: "https://stats.nba.com/stats/"
      NBA_STATS_REFERER: "https://www.nba.com/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: nba_service/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: python manage.py migrate --settings=config.settings.test

      - name: Run tests
        run: python -m pytest tests/ --no-cov -q

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=apps --cov=clients --cov-report=term-missing --cov-report=xml -p no:cov --override-ini="addopts=" -q
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: nba_service/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nba_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nba_service/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
